name: Chatbot E2E + LLM-as-Judge

on:
  push:
    branches: ['phase/*', main, main2]
  pull_request:
    branches: [main, main2]

env:
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GEMINI_CHAT_MODEL: gemini-2.5-flash
  JWT_ACCESS_SECRET: ci-test-jwt-secret
  JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret
  LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
  LANGSMITH_PROJECT: healplace-cardio-ci
  LANGSMITH_TRACING_V2: 'true'
  RESEND_API_KEY: re_dummy_key_for_ci
  EMAIL_FROM: 'Test <test@test.com>'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd backend && npm ci
      - run: cd backend && npx prisma generate
      - run: cd backend && npm test -- --passWithNoTests

  # ─────────────────────────────────────────────────────────────────────────
  text-chat-eval:
    name: Text Chat — E2E + LLM Judge
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || !github.event.pull_request.draft
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: healplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/healplace_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Install & setup
        run: |
          cd backend && npm ci
          npx prisma generate
          npx prisma migrate deploy

      - name: Run text chat E2E + LLM-as-Judge
        run: cd backend && npm run test:e2e -- --testPathPatterns=text-chat.e2e --forceExit
        timeout-minutes: 15

  # ─────────────────────────────────────────────────────────────────────────
  voice-chat-eval:
    name: Voice Chat — E2E + LLM Judge
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' || !github.event.pull_request.draft
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: healplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/healplace_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Install backend
        run: |
          cd backend && npm ci
          npx prisma generate
          npx prisma migrate deploy

      - name: Run voice chat E2E + LLM-as-Judge
        run: cd backend && npm run test:e2e -- --testPathPatterns=voice-chat.e2e --forceExit
        timeout-minutes: 15
