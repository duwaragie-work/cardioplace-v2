name: Chatbot E2E + LLM-as-Judge

# Mirrors the E2E (Playwright) flow: runs on PRs targeting `dev` (feature → dev)
# and `main` (the dev → main promotion). All changes go through `dev` first, so
# this is the chatbot gate at that boundary.
on:
  pull_request:
    branches:
      - dev
      - main

# Cancel older runs when a new commit lands on the same PR (matches e2e.yml) —
# saves runner minutes when reviewers keep pushing fixups.
concurrency:
  group: llm-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  GEMINI_CHAT_MODEL: gemini-2.5-flash
  # CI-only throwaway values, randomly generated. Must be REAL random values, not
  # readable placeholders — the boot guard (backend/src/common/config/secret-guard.ts)
  # refuses to start on anything placeholder-shaped.
  JWT_ACCESS_SECRET: SCRUBBED-ROTATED-CI-SECRET
  JWT_REFRESH_SECRET: SCRUBBED-ROTATED-CI-SECRET
  LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
  LANGSMITH_PROJECT: healplace-cardio-ci
  LANGSMITH_TRACING_V2: 'true'
  RESEND_API_KEY: re_dummy_key_for_ci
  EMAIL_FROM: 'Test <test@test.com>'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm workspaces: deps + lockfile live at the repo ROOT (there is no
      # backend/package-lock.json), so install once from the root. jest is
      # hoisted to the root node_modules — invoke it via `npx jest`, not the
      # backend `node_modules/jest/bin/jest.js` path (that path 404s under
      # hoisting and was the original failure).
      - name: Install workspace deps
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate
      - name: Backend unit tests
        working-directory: backend
        env:
          NODE_OPTIONS: --experimental-vm-modules
        run: npx jest --passWithNoTests

  # ─────────────────────────────────────────────────────────────────────────
  text-chat-eval:
    name: Text Chat — E2E + LLM Judge
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ !github.event.pull_request.draft }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: healplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/healplace_test
      # Vertex AI — the LLM-judge specs self-skip when GOOGLE_CLOUD_PROJECT is
      # unset (skip = !process.env.GOOGLE_CLOUD_PROJECT). Set it so they run;
      # the SA-key step below supplies ADC creds for the actual Vertex calls.
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install workspace deps
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Prisma generate + migrate
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
      # Vertex AI ADC: @google/genai authenticates via Application Default
      # Credentials, which loads a key-file PATH from
      # GOOGLE_APPLICATION_CREDENTIALS. The secret holds the JSON, so write it
      # to a temp file and point ADC at it (env: + printf so the JSON body
      # can't break the shell).
      - name: Write GCP service-account key
        env:
          GCP_SA_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GCP_SA_JSON" > "$RUNNER_TEMP/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Run text chat E2E + LLM-as-Judge
        working-directory: backend
        run: npm run test:e2e -- --testPathPatterns=text-chat.e2e --forceExit
        timeout-minutes: 15

  # ─────────────────────────────────────────────────────────────────────────
  voice-chat-eval:
    name: Voice Chat — E2E + LLM Judge
    runs-on: ubuntu-latest
    needs: unit-tests
    if: ${{ !github.event.pull_request.draft }}
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: healplace_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/healplace_test
      # Vertex AI — the LLM-judge specs self-skip when GOOGLE_CLOUD_PROJECT is
      # unset (skip = !process.env.GOOGLE_CLOUD_PROJECT). Set it so they run;
      # the SA-key step below supplies ADC creds for the actual Vertex calls.
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install workspace deps
        run: npm ci
      - name: Build shared package
        run: npm run build:shared
      - name: Prisma generate + migrate
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma migrate deploy
      # Vertex AI ADC — see the text-chat job; materialize the SA key for the
      # @google/genai client + the LLM judge.
      - name: Write GCP service-account key
        env:
          GCP_SA_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          printf '%s' "$GCP_SA_JSON" > "$RUNNER_TEMP/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Run voice chat E2E + LLM-as-Judge
        working-directory: backend
        run: npm run test:e2e -- --testPathPatterns=voice-chat.e2e --forceExit
        timeout-minutes: 15
