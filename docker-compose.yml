version: '3.9'

services:
  # ── NestJS backend (voice runs in-process via @google/genai Live) ───────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: ./backend/.env
    environment:
      PORT: 8080
    ports:
      - '8080:8080'
    networks:
      - healplace

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: ./frontend/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - healplace

networks:
  healplace:
    driver: bridge
